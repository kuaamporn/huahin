<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Finance — HuaHin</title>
  <style>
    /*
      TODO(Claude Code): replace this whole <style> block with the actual
      :root variables and component classes copy-pasted from dashboard.html
      so finance.html visually matches the rest of the app exactly
      (same --ink/--paper/--go/--warn/--muted palette, same .card-section,
      .pill, button, table styles, modal-overlay/modal-box, etc). The
      styles below are placeholders only so this file is self-contained
      and testable in isolation before that swap happens.
    */
    :root {
      --ink: #1a1d1f;
      --paper: #fafaf8;
      --line: #e2e0db;
      --go: #1f6f4f;
      --warn: #b5460a;
      --muted: #6b6862;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--paper); color: var(--ink); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .toplinks { display: flex; gap: 16px; }
    .toplinks a { font-size: 13px; color: var(--muted); text-decoration: none; }
    .toplinks a:hover { color: var(--go); }
    .summary { display: flex; gap: 12px; margin-bottom: 20px; }
    .stat { flex: 1; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px; text-align: center; }
    .stat .n { font-size: 26px; font-weight: 700; }
    .stat .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--line); }
    th { background: #f3f1ec; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .03em; }
    tr:last-child td { border-bottom: none; }
    .pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; }
    .pill.ok { background: #d8efe2; color: #16523a; }
    .pill.flag { background: #fde2d3; color: var(--warn); }
    .muted { color: var(--muted); font-size: 13px; }
    button { padding: 8px 14px; font-size: 13px; border: 1px solid var(--line); background: #fff; border-radius: 7px; cursor: pointer; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
    input, select { width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid var(--line); border-radius: 7px; }
    .btn-primary { background: var(--go); color: #fff; border: none; padding: 12px; border-radius: 7px; font-weight: 600; cursor: pointer; }
    .btn-secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); padding: 12px; border-radius: 7px; font-weight: 600; cursor: pointer; }
    .error { color: var(--warn); font-size: 13px; margin-top: 8px; }
    .hidden { display: none !important; }
    .card-section { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .actions-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal-box { background: #fff; border-radius: 10px; padding: 18px 24px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-box h2 { margin: 0 0 4px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal-grid label { margin: 8px 0 5px; }
    .modal-grid input, .modal-grid select { padding: 8px 11px; font-size: 14px; }
    .modal-footer-row { display: flex; gap: 10px; margin-top: 14px; }

    .room-combo { position: relative; }
    .room-combo-results {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
      background: #fff; border: 1px solid var(--line); border-radius: 7px;
      margin-top: 2px; max-height: 220px; overflow-y: auto;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .room-combo-results .opt { padding: 8px 11px; font-size: 13px; cursor: pointer; }
    .room-combo-results .opt:hover, .room-combo-results .opt.active { background: #f3f1ec; }
    .room-combo-results .opt .rid { font-weight: 600; }
    .room-combo-results .opt .guest { color: var(--muted); font-size: 12px; margin-left: 6px; }
    .room-combo-results .opt.walkin { color: var(--go); font-weight: 600; border-top: 1px solid var(--line); }
    .room-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px;
      border: 1px solid var(--line); border-radius: 7px; font-size: 13px; background: #f7f6f3;
    }
    .room-pill .x { cursor: pointer; color: var(--muted); font-weight: 700; padding: 0 2px; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Finance</h1>
        <div class="sub">Revenue and expense tracking per property.</div>
      </div>
      <div class="toplinks">
        <a href="index.html" id="link-checkin">Check-in</a>
        <a href="rooms.html" id="link-rooms" class="hidden">Rooms</a>
        <a href="dashboard.html" id="link-dashboard" class="hidden">Dashboard</a>
        <a href="#" id="logout-link">Sign out</a>
      </div>
    </div>

    <div id="access-denied" class="card-section hidden">
      <div class="error">You don't have permission to view Finance. Redirecting…</div>
    </div>

    <div id="finance-content">
      <div class="card-section">
        <div class="toolbar">
          <div>
            <label for="finance-property">Property</label>
            <select id="finance-property">
              <option value="precious">The Precious</option>
              <option value="moment">The Moment</option>
            </select>
          </div>
          <div>
            <label for="finance-year">Year</label>
            <input id="finance-year" type="number" style="max-width:120px;" />
          </div>
          <div>
            <label for="finance-month">Month</label>
            <select id="finance-month">
              <option value="1">January</option><option value="2">February</option>
              <option value="3">March</option><option value="4">April</option>
              <option value="5">May</option><option value="6">June</option>
              <option value="7">July</option><option value="8">August</option>
              <option value="9">September</option><option value="10">October</option>
              <option value="11">November</option><option value="12">December</option>
            </select>
          </div>
          <button id="finance-load-btn">Load</button>
        </div>
      </div>

      <div class="summary">
        <div class="stat"><div class="n" id="finance-revenue" style="color:var(--go);">฿0</div><div class="l">Revenue</div></div>
        <div class="stat"><div class="n" id="finance-expense" style="color:var(--warn);">฿0</div><div class="l">Expense</div></div>
        <div class="stat"><div class="n" id="finance-net">฿0</div><div class="l">Net Profit</div></div>
      </div>

      <div class="actions-row">
        <button id="btn-add-revenue" class="hidden" style="background:var(--go);color:#fff;border:none;font-weight:600;">+ Revenue</button>
        <button id="btn-add-expense" class="hidden" style="background:var(--warn);color:#fff;border:none;font-weight:600;">+ Expense</button>
        <input id="finance-search" type="text" placeholder="Search transactions..." style="max-width:250px;" />
        <button id="finance-export-csv-btn" style="margin-left:auto;">Export CSV</button>
      </div>

      <table>
        <thead>
          <tr><th>Date</th><th>Direction</th><th>Property</th><th>Category</th><th>Amount</th><th>Guest/Vendor</th><th>Note</th></tr>
        </thead>
        <tbody id="finance-table-body">
          <tr><td colspan="7" class="muted" style="text-align:center;padding:20px;">Select a month and click Load.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== FINANCE ADD MODAL ===================== -->
  <div id="finance-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 id="finance-modal-title">+ Add Revenue</h2>
      <div class="modal-grid">

        <div>
          <label for="fm-property">Property</label>
          <select id="fm-property">
            <option value="precious">The Precious</option>
            <option value="moment">The Moment</option>
          </select>
        </div>

        <div>
          <label for="fm-room-search">Room</label>
          <div class="room-combo">
            <input id="fm-room-search" type="text" placeholder="Search room ID, e.g. P-110…" autocomplete="off" />
            <div id="fm-room-results" class="room-combo-results hidden"></div>
          </div>
          <!-- Hidden field actually submitted; null when Walk-in is chosen -->
          <input type="hidden" id="fm-room-id" value="" />
          <div id="fm-room-selected" class="hidden" style="margin-top:6px;">
            <span class="room-pill"><span id="fm-room-selected-label"></span><span class="x" id="fm-room-clear">✕</span></span>
          </div>
        </div>

        <div>
          <label for="fm-category">Category</label>
          <select id="fm-category"></select>
        </div>

        <div>
          <label for="fm-guest">Guest / Vendor</label>
          <input id="fm-guest" type="text" placeholder="Auto-filled from room, or enter manually" />
        </div>

        <div>
          <label for="fm-amount">Amount (฿)</label>
          <input id="fm-amount" type="number" min="1" step="1" />
        </div>

        <div>
          <label for="fm-channel">Payment channel</label>
          <select id="fm-channel">
            <option value="cash">Cash</option>
            <option value="kbank">KBank</option>
            <option value="scb">SCB</option>
            <option value="scb_sere">SCB Sere</option>
          </select>
        </div>

        <div>
          <label for="fm-ref">Transfer ref (optional)</label>
          <input id="fm-ref" type="text" />
        </div>

        <div>
          <label for="fm-date">Transaction date</label>
          <input id="fm-date" type="date" />
        </div>

        <div class="full">
          <label for="fm-note">Note (optional)</label>
          <input id="fm-note" type="text" />
        </div>

      </div>

      <div class="modal-footer-row">
        <button class="btn-secondary" id="finance-modal-cancel">Cancel</button>
        <button class="btn-primary" id="finance-modal-save">Save</button>
      </div>
      <div class="error hidden" id="finance-modal-error"></div>
    </div>
  </div>

  <script src="session.js"></script>
  <script>
    // =====================================================================
    // CONFIG — must match the Worker URL used in index.html/rooms.html/dashboard.html
    // =====================================================================
    var WORKER_API_URL = 'https://employee-checkin-api.huahin.workers.dev';

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function callApi(action, params) {
      return fetch(WORKER_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action, params: params || [] })
      }).then(function (res) { return res.json(); });
    }

    // ---------------------------------------------------------------------
    // ACCESS CONTROL — runs before anything else renders.
    // Redirects to index.html if not logged in at all (handled inside
    // requireSession), or if logged in but lacking a finance-capable role.
    // ---------------------------------------------------------------------
    var session = HuaHinSession.requireSession();
    if (session) {
      var canViewFinance = HuaHinSession.hasRole('owner', 'accountant', 'revenue', 'expense');
      if (!canViewFinance) {
        hide('finance-content');
        show('access-denied');
        setTimeout(function () { window.location.href = 'index.html'; }, 1800);
      } else {
        var token = session.token;

        // Reveal nav links the user has access to, alongside this page's own content.
        if (HuaHinSession.hasRole('owner')) show('link-dashboard');
        if (HuaHinSession.hasRole('owner', 'frontdesk')) show('link-rooms');

        var canAddRevenue = HuaHinSession.hasRole('owner', 'revenue');
        var canAddExpense = HuaHinSession.hasRole('owner', 'expense');
        if (canAddRevenue) show('btn-add-revenue');
        if (canAddExpense) show('btn-add-expense');

        loadRoomsAndBookingsCache();
        initFinancePage();
      }
    }
    // If session is null, requireSession() already triggered a redirect —
    // nothing below this point should run for that case, so everything
    // else is inside the `if (session)` block or registered as a deferred
    // handler that simply won't be reachable if we navigated away.

    document.getElementById('logout-link').addEventListener('click', function (e) {
      e.preventDefault();
      var s = HuaHinSession.getSession();
      if (s && s.token) callApi('logout', [s.token]).catch(function () {});
      HuaHinSession.clearSession();
      window.location.href = 'index.html';
    });

    function todayDateStringForInput() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function formatTHB(n) {
      return '฿' + (Number(n) || 0).toLocaleString('en-US');
    }

    function initFinancePage() {
      var now = new Date();
      document.getElementById('finance-year').value = now.getFullYear();
      document.getElementById('finance-month').value = String(now.getMonth() + 1);

      document.getElementById('finance-load-btn').addEventListener('click', loadFinanceData);
      document.getElementById('btn-add-revenue').addEventListener('click', function () { openFinanceModal('revenue'); });
      document.getElementById('btn-add-expense').addEventListener('click', function () { openFinanceModal('expense'); });
      document.getElementById('finance-modal-cancel').addEventListener('click', function () { hide('finance-modal'); });
      document.getElementById('finance-modal-save').addEventListener('click', saveFinanceEntry);
      document.getElementById('finance-export-csv-btn').addEventListener('click', exportFinanceCsv);

      document.getElementById('finance-search').addEventListener('input', function () {
        var q = this.value.trim().toLowerCase();
        var rows = document.querySelectorAll('#finance-table-body tr');
        rows.forEach(function (row) {
          row.style.display = row.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
        });
      });

      document.getElementById('fm-property').addEventListener('change', function () {
        clearSelectedRoom();
        document.getElementById('fm-room-results').classList.add('hidden');
      });

      initRoomCombo();
      loadFinanceData();
    }

    // ---------------------------------------------------------------------
    // ROOM SEARCH-COMBO
    // Loads the same room + booking data rooms.html uses, so the dropdown
    // only ever offers room_ids that genuinely exist in D1 — this is what
    // prevents the "D1_ERROR: FOREIGN KEY constraint failed" that happened
    // when a room code was typed by hand (e.g. "P110" instead of the real
    // "P-110") into a free-text field.
    // ---------------------------------------------------------------------
    var ROOMS_CACHE = [];
    var BOOKINGS_CACHE = [];
    var roomComboActiveIndex = -1;

    function loadRoomsAndBookingsCache() {
      return Promise.all([
        callApi('roomsList', ['combined']),
        callApi('bookingsList', ['combined'])
      ]).then(function (results) {
        if (results[0] && results[0].ok) ROOMS_CACHE = results[0].rooms || [];
        if (results[1] && results[1].ok) BOOKINGS_CACHE = results[1].bookings || [];
      }).catch(function () {
        // Non-fatal: room search-combo will just come up empty until
        // retried (e.g. next time the modal is opened); finance page
        // itself still works.
      });
    }

    function todayStr() { return todayDateStringForInput(); }

    function activeBookingForRoom(roomId) {
      var ds = todayStr();
      for (var i = 0; i < BOOKINGS_CACHE.length; i++) {
        var b = BOOKINGS_CACHE[i];
        if (b.roomId === roomId &&
            (b.checkinDate || '').slice(0, 10) <= ds &&
            (b.checkoutDate || '').slice(0, 10) > ds) {
          return b;
        }
      }
      return null;
    }

    function initRoomCombo() {
      var input = document.getElementById('fm-room-search');
      var results = document.getElementById('fm-room-results');

      input.addEventListener('input', function () {
        renderRoomComboResults(this.value.trim().toLowerCase());
      });
      input.addEventListener('focus', function () {
        renderRoomComboResults(this.value.trim().toLowerCase());
      });
      document.addEventListener('click', function (e) {
        if (!results.contains(e.target) && e.target !== input) {
          results.classList.add('hidden');
        }
      });

      document.getElementById('fm-room-clear').addEventListener('click', clearSelectedRoom);
    }

    function renderRoomComboResults(query) {
      var results = document.getElementById('fm-room-results');
      var property = document.getElementById('fm-property').value;

      var pool = ROOMS_CACHE.filter(function (r) { return r.propertyId === property; });
      if (query) {
        pool = pool.filter(function (r) {
          return r.roomId.toLowerCase().indexOf(query) >= 0 ||
                 (r.displayName || '').toLowerCase().indexOf(query) >= 0;
        });
      }
      pool = pool.slice(0, 30); // keep the dropdown short and fast to scan

      var html = pool.map(function (r) {
        var booking = activeBookingForRoom(r.roomId);
        var guestHtml = booking ? '<span class="guest">' + escapeHtml(booking.guestName || '') + '</span>' : '<span class="guest">vacant</span>';
        return '<div class="opt" data-room-id="' + escapeHtml(r.roomId) + '" data-guest="' + escapeHtml(booking ? (booking.guestName || '') : '') + '">' +
          '<span class="rid">' + escapeHtml(r.displayName || r.roomId) + '</span>' + guestHtml +
          '</div>';
      }).join('');

      html += '<div class="opt walkin" data-room-id="">Walk-in / no room (e.g. day-use, no booking on file)</div>';

      results.innerHTML = html;
      results.classList.remove('hidden');

      results.querySelectorAll('.opt').forEach(function (el) {
        el.addEventListener('click', function () {
          selectRoom(this.dataset.roomId, this.dataset.guest);
        });
      });
    }

    function selectRoom(roomId, guestName) {
      document.getElementById('fm-room-id').value = roomId || '';
      document.getElementById('fm-room-search').value = '';
      document.getElementById('fm-room-results').classList.add('hidden');

      if (roomId) {
        var room = ROOMS_CACHE.filter(function (r) { return r.roomId === roomId; })[0];
        document.getElementById('fm-room-selected-label').textContent = room ? (room.displayName || roomId) : roomId;
        document.getElementById('fm-room-selected').classList.remove('hidden');
        // Auto-fill guest only if the field is currently empty, so we
        // don't clobber something the person already typed.
        var guestField = document.getElementById('fm-guest');
        if (!guestField.value && guestName) guestField.value = guestName;
      } else {
        document.getElementById('fm-room-selected-label').textContent = 'Walk-in (no room)';
        document.getElementById('fm-room-selected').classList.remove('hidden');
      }
    }

    function clearSelectedRoom() {
      document.getElementById('fm-room-id').value = '';
      document.getElementById('fm-room-selected').classList.add('hidden');
      document.getElementById('fm-room-search').value = '';
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = String(str == null ? '' : str);
      return div.innerHTML;
    }

    function loadFinanceData() {
      var propertyId = document.getElementById('finance-property').value;
      var year = document.getElementById('finance-year').value;
      var month = String(document.getElementById('finance-month').value).padStart(2, '0');
      var billingMonth = year + '-' + month;

      callApi('financeGetMonthlySummary', [session.token, propertyId, billingMonth]).then(function (res) {
        if (!res.ok) { alert(res.error); return; }
        document.getElementById('finance-revenue').textContent = formatTHB(res.totalRevenue);
        document.getElementById('finance-expense').textContent = formatTHB(res.totalExpense);
        document.getElementById('finance-net').textContent = formatTHB(res.netProfit);
      });

      callApi('financeListTransactions', [session.token, propertyId, billingMonth]).then(function (res) {
        if (!res.ok) { alert(res.error); return; }
        var tbody = document.getElementById('finance-table-body');
        var list = res.transactions || [];
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="muted" style="text-align:center;padding:20px;">No transactions for this month.</td></tr>';
          return;
        }
        tbody.innerHTML = '';
        list.forEach(function (t) {
          var tr = document.createElement('tr');
          var dirLabel = t.direction === 'IN' ? '<span class="pill ok">Revenue</span>' : '<span class="pill flag">Expense</span>';
          tr.innerHTML =
            '<td>' + (t.txn_date || '') + '</td>' +
            '<td>' + dirLabel + '</td>' +
            '<td>' + (t.property_id || '') + '</td>' +
            '<td>' + (t.category || '') + '</td>' +
            '<td>' + formatTHB(t.amount) + '</td>' +
            '<td>' + (t.guest_or_vendor || '') + '</td>' +
            '<td>' + (t.notes || '') + '</td>';
          tbody.appendChild(tr);
        });
      });
    }

    var financeModalMode = 'revenue';
    var REVENUE_CATS = ['rent', 'walkin', 'deposit', 'fitness', 'breakfast', 'other'];
    var EXPENSE_CATS = ['utility', 'repair', 'cleaning', 'supplies', 'salaries', 'other'];

    function openFinanceModal(mode) {
      financeModalMode = mode;
      document.getElementById('finance-modal-title').textContent = mode === 'revenue' ? '+ Add Revenue' : '+ Add Expense';
      var cats = mode === 'revenue' ? REVENUE_CATS : EXPENSE_CATS;
      document.getElementById('fm-category').innerHTML = cats.map(function (c) {
        return '<option value="' + c + '">' + c.charAt(0).toUpperCase() + c.slice(1) + '</option>';
      }).join('');
      document.getElementById('fm-amount').value = '';
      document.getElementById('fm-guest').value = '';
      clearSelectedRoom();
      document.getElementById('fm-ref').value = '';
      document.getElementById('fm-note').value = '';
      document.getElementById('fm-date').value = todayDateStringForInput();
      hide('finance-modal-error');
      show('finance-modal');

      // Refresh in the background so the combo reflects the latest
      // bookings even if the page has been open a while.
      loadRoomsAndBookingsCache();
    }

    function saveFinanceEntry() {
      var propertyId = document.getElementById('fm-property').value;
      var roomId = document.getElementById('fm-room-id').value.trim() || null;
      var category = document.getElementById('fm-category').value;
      var guest = document.getElementById('fm-guest').value.trim() || null;
      var amount = Number(document.getElementById('fm-amount').value);
      var channel = document.getElementById('fm-channel').value;
      var ref = document.getElementById('fm-ref').value.trim() || null;
      var note = document.getElementById('fm-note').value.trim() || null;
      var txnDate = document.getElementById('fm-date').value;

      hide('finance-modal-error');
      if (!amount || amount <= 0) {
        document.getElementById('finance-modal-error').textContent = 'Enter a valid amount.';
        show('finance-modal-error');
        return;
      }
      if (!txnDate) {
        document.getElementById('finance-modal-error').textContent = 'Select a date.';
        show('finance-modal-error');
        return;
      }

      var action = financeModalMode === 'revenue' ? 'financeAddRevenue' : 'financeAddExpense';
      var btn = document.getElementById('finance-modal-save');
      btn.disabled = true; btn.textContent = 'Saving...';

      callApi(action, [session.token, propertyId, roomId, category, guest, amount, channel, ref, note, txnDate])
        .then(function (res) {
          btn.disabled = false; btn.textContent = 'Save';
          if (res.ok) {
            hide('finance-modal');
            loadFinanceData();
          } else {
            document.getElementById('finance-modal-error').textContent = res.error;
            show('finance-modal-error');
          }
        }).catch(function (err) {
          btn.disabled = false; btn.textContent = 'Save';
          document.getElementById('finance-modal-error').textContent = 'Connection error: ' + err.message;
          show('finance-modal-error');
        });
    }

    function exportFinanceCsv() {
      var rows = [['Date', 'Direction', 'Property', 'Category', 'Amount', 'Guest/Vendor', 'Note']];
      document.querySelectorAll('#finance-table-body tr').forEach(function (tr) {
        var cells = [];
        tr.querySelectorAll('td').forEach(function (td) { cells.push(td.textContent); });
        if (cells.length === 7) rows.push(cells);
      });
      var csv = rows.map(function (r) {
        return r.map(function (c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
      }).join('\r\n');
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'finance-' + document.getElementById('finance-year').value + '-' + document.getElementById('finance-month').value + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
