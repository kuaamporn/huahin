<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Invoices</title>
  <style>
    body { font-family: 'Tahoma', sans-serif; background: #e5e5e5; margin: 0; padding: 20px; color: #000; font-size: 11px; }
    .print-btn-container { text-align: center; margin-bottom: 20px; }

    .a4-page {
      width: 21cm; min-height: 29.7cm; margin: 0 auto 30px; background: #fff;
      padding: 0.5cm; display: flex; flex-direction: column; gap: 0.5cm;
      page-break-after: always; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .slip {
      border: 2px solid #000;
      height: 9.1cm;
      display: flex; flex-direction: column;
      box-sizing: border-box;
    }

    .slip-header { display: flex; padding: 4px; border-bottom: 2px solid #000; font-weight: bold; font-size: 13px; }
    .slip-remark { display: flex; border-bottom: 2px solid #000; }
    .slip-meta { display: flex; border-bottom: 2px solid #000; }
    .slip-items { flex: 1; display: flex; flex-direction: column; border-bottom: 2px solid #000; }
    .items-head { display: flex; border-bottom: 2px solid #000; background: #f0f0f0; }
    .items-body { flex: 1; display: flex; flex-direction: column; }
    .item-row { display: flex; }
    .item-row div { padding: 4px; }
    .slip-footer { display: flex; height: 2cm; }
    .bank-info { flex: 1; padding: 4px; font-size: 10px; line-height: 1.4; border-right: 2px solid #000; }
    .sig-box { width: 35%; display: flex; flex-direction: column; }
    .grand-total { display: flex; border-bottom: 2px solid #000; }
    .sig-space { flex: 1; text-align: center; padding-top: 25px; }

    @media print {
      body { background: #fff; padding: 0; }
      .a4-page { box-shadow: none; margin: 0; }
      .no-print { display: none; }
    }
  </style>
</head>
<body>
  <div class="print-btn-container no-print">
    <button onclick="window.print()" style="padding:15px 30px; font-size:18px; background:#0F766E; color:#fff; border:none; cursor:pointer; font-weight:bold; border-radius:6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Print All Invoices</button>
  </div>

  <div id="invoices-container">
    <div style="text-align:center; padding: 50px;">Loading invoices...</div>
  </div>

  <script src="session.js"></script>
  <script>
    var WORKER_API_URL = 'https://huahin-api.huahin.workers.dev';

    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    window.onload = async function() {
      if (!HuaHinSession.requireSession()) return;
      var urlParams = new URLSearchParams(window.location.search);
      var idsStr = urlParams.get('ids');
      if (!idsStr) { document.getElementById('invoices-container').innerHTML = '<div style="text-align:center; color:red;">No transaction IDs provided.</div>'; return; }

      var txnIds = idsStr.split(',').filter(function(id) { return id.trim(); });
      var container = document.getElementById('invoices-container');
      container.innerHTML = '';

      var session = HuaHinSession.getSession();
      var token = session ? session.token : null;

      var currentA4Page = null;
      var slipsCount = 0;

      for (var i = 0; i < txnIds.length; i++) {
        var txnId = txnIds[i];

        try {
          var res = await fetch(WORKER_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'financeGetTransaction', params: [token, txnId] })
          });
          var data = await res.json();
          if (!data.ok) {
            console.error(data.error);
            continue;
          }

          var t = data.transaction;

          var itemsHtml = '';
          for (var j = 0; j < t.items.length; j++) {
            var item = t.items[j];
            itemsHtml +=
              '<div class="item-row">' +
              '<div style="flex:1; border-right: 2px solid #000;">' + escapeHtml(item.description) + '</div>' +
              '<div style="width:20%; border-right: 2px solid #000; text-align: center;">' + (item.units || 1) + '</div>' +
              '<div style="width:25%; text-align: right;">' + item.amount.toLocaleString(undefined, {minimumFractionDigits: 2}) + '</div>' +
              '</div>';
          }
          itemsHtml +=
            '<div class="item-row" style="flex:1;">' +
            '<div style="flex:1; border-right: 2px solid #000;"></div>' +
            '<div style="width:20%; border-right: 2px solid #000;"></div>' +
            '<div style="width:25%;"></div>' +
            '</div>';

          var propertyName = t.property_id === 'precious' ? 'The Precious' : 'The Moment';

          var slipHtml =
            '<div class="slip">' +
              '<div class="slip-header">' +
                '<div style="flex:1;">' + propertyName + '</div>' +
                '<div>Invoice</div>' +
              '</div>' +
              '<div class="slip-remark">' +
                '<div style="flex:1; border-right: 2px solid #000; padding: 4px; font-size: 9px; line-height: 1.2;">' +
                  'Remark : *rent and utility charges are to be paid by the 5th day of every month. 150 Baht per day will be charged in case of payment delays until payment is received' +
                '</div>' +
                '<div style="width: 30%; display: flex;">' +
                  '<div style="flex:1; border-right: 2px solid #000; padding: 4px; display: flex; align-items: center; justify-content: center;">Issue month</div>' +
                  '<div style="flex:1; padding: 4px; display: flex; align-items: center; justify-content: center;">' + escapeHtml(t.billing_month || '') + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="slip-meta">' +
                '<div style="width:10%; padding: 4px; border-right: 1px solid #000;">Name</div>' +
                '<div style="width:40%; padding: 4px; border-right: 2px solid #000; text-align: center;">' + escapeHtml(t.guest_or_vendor || '-') + '</div>' +
                '<div style="width:12%; padding: 4px; border-right: 1px solid #000;">Issue date</div>' +
                '<div style="width:15%; padding: 4px; border-right: 2px solid #000; text-align: center;">' + escapeHtml(t.txn_date) + '</div>' +
                '<div style="width:13%; padding: 4px; border-right: 1px solid #000;">Room</div>' +
                '<div style="width:10%; padding: 4px; text-align: center; font-weight: bold;">' + escapeHtml(t.room_name || '-') + '</div>' +
              '</div>' +
              '<div class="slip-items">' +
                '<div class="items-head">' +
                  '<div style="flex:1; padding: 4px; text-align: center; border-right: 2px solid #000;">Description</div>' +
                  '<div style="width:20%; padding: 4px; text-align: center; border-right: 2px solid #000;">Units</div>' +
                  '<div style="width:25%; padding: 4px; text-align: center;">Amount</div>' +
                '</div>' +
                '<div class="items-body">' + itemsHtml + '</div>' +
              '</div>' +
              '<div class="slip-footer">' +
                '<div class="bank-info">' +
                  'Bank Transfer: Account name Krittapong Uaamporn<br>' +
                  'Bank Account No: 002-1-36419-3<br>' +
                  'Bank: Kasikorn Bank, Branch: Hua Hin Market Village' +
                '</div>' +
                '<div class="sig-box">' +
                  '<div class="grand-total">' +
                    '<div style="flex:1; padding: 4px; border-right: 2px solid #000; font-weight: bold;">Grand Total</div>' +
                    '<div style="flex:1; padding: 4px; text-align: right; font-weight: bold;">' + t.amount.toLocaleString(undefined, {minimumFractionDigits: 2}) + '</div>' +
                  '</div>' +
                  '<div class="sig-space">Approved by</div>' +
                '</div>' +
              '</div>' +
            '</div>';

          if (slipsCount % 3 === 0) {
            currentA4Page = document.createElement('div');
            currentA4Page.className = 'a4-page';
            container.appendChild(currentA4Page);
          }

          currentA4Page.insertAdjacentHTML('beforeend', slipHtml);
          slipsCount++;

        } catch(e) {
          console.error(e);
        }
      }

      if (container.innerHTML === '') {
        container.innerHTML = '<div style="text-align:center; color:red;">Failed to load invoices.</div>';
      }
    };
  </script>
</body>
</html>
