<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Printout</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap');

    body {
      font-family: 'Sarabun', sans-serif;
      background: #e5e5e5;
      margin: 0;
      padding: 20px;
      color: #000;
      font-size: 14px;
      line-height: 1.4;
    }

    .a4-paper {
      background: #fff;
      width: 21cm;
      height: 29.7cm;
      margin: 0 auto 30px auto;
      padding: 1.5cm 1.5cm;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      page-break-after: always;
      position: relative;
    }

    .a4-paper:last-of-type {
      page-break-after: avoid;
    }

    .company-header {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    .company-name-th { font-size: 16px; font-weight: bold; }
    .company-name-en { font-size: 15px; font-weight: bold; margin-bottom: 2px; }
    .company-address { font-size: 12px; color: #333; line-height: 1.3; }

    .receipt-title-bar {
      border-top: 1.5px solid #000;
      border-bottom: 1.5px solid #000;
      padding: 5px 0;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .meta-grid {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .meta-left {
      flex: 1.5;
      padding-right: 20px;
    }

    .meta-right {
      flex: 1;
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .meta-row {
      display: flex;
      margin-bottom: 4px;
    }

    .meta-label {
      font-weight: bold;
      width: 170px;
      text-align: left;
    }

    .meta-value {
      flex: 1;
      text-align: left;
    }

    .table-container {
      flex: 1;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 8px 5px;
      font-weight: bold;
      font-size: 13px;
      text-align: left;
    }

    td {
      padding: 6px 5px;
      font-size: 13px;
      vertical-align: top;
      text-align: left;
    }

    .border-bottom-dot {
      border-bottom: 1px dashed #ccc;
    }

    .right { text-align: right; }
    .center { text-align: center; }

    .summary-section {
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 25px;
    }

    .baht-text-box {
      font-weight: bold;
      font-style: italic;
    }

    .total-box {
      font-weight: bold;
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .double-underline {
      border-bottom: 3px double #000;
      padding-bottom: 2px;
    }

    .remark-section {
      font-size: 12px;
      margin-bottom: 35px;
      border-bottom: 1px dashed #ccc;
      padding-bottom: 10px;
    }
    .editable-remark:focus {
      background: #fff9c4;
    }

    .signature-grid {
      display: flex;
      justify-content: space-between;
      gap: 100px;
      margin-top: auto;
      padding-bottom: 20px;
    }

    .sig-col {
      flex: 1;
      text-align: center;
      font-size: 13px;
    }

    .sig-line {
      border-bottom: 1px dashed #000;
      margin-bottom: 8px;
      height: 45px;
    }

    .no-print-bar {
      max-width: 21cm;
      margin: 0 auto 15px auto;
      text-align: right;
    }

    .btn-print {
      padding: 10px 20px;
      background: #0F766E;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
      font-family: inherit;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .a4-paper { box-shadow: none; margin: 0; padding: 1.5cm 1.5cm; width: auto; height: auto; }
      .no-print-bar { display: none; }
      .editable-remark { border-bottom: none !important; background: transparent !important; }
    }
  </style>
  <style>
    .watermark-cancelled {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      font-size: 80px;
      font-weight: bold;
      color: rgba(220, 38, 38, 0.12);
      border: 10px solid rgba(220, 38, 38, 0.12);
      padding: 15px 40px;
      border-radius: 20px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="no-print-bar">
    <button class="btn-print" onclick="window.print()">Print Receipt / พิมพ์ใบเสร็จ</button>
  </div>

  <div id="receipt-container"></div>

  <script src="session.js"></script>
  <script src="ui.js"></script>
  <script>
    var WORKER_API_URL = 'https://huahin-api.huahin.workers.dev';

    function escapeHtml(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatBE(dateStr) {
      if (!dateStr) return '-';
      var p = dateStr.split('-');
      if (p.length !== 3) return dateStr;
      var y = parseInt(p[0]) + 543;
      var m = parseInt(p[1]);
      var d = parseInt(p[2]);
      return d + '/' + m + '/' + y;
    }

    function bahtText(num) {
      if (!num || isNaN(num)) return 'ศูนย์บาทถ้วน';
      num = Math.round(num * 100) / 100;
      var parts = num.toString().split('.');
      var baht = parts[0];
      var satang = parts.length > 1 ? parts[1] : null;

      var numbers = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
      var positions = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];

      function convertSection(section) {
        var text = '';
        var len = section.length;
        for (var i = 0; i < len; i++) {
          var digit = parseInt(section.charAt(i));
          var pos = len - i - 1;
          if (digit !== 0) {
            if (pos === 1 && digit === 2) text += 'ยี่';
            else if (pos === 1 && digit === 1) text += '';
            else if (pos === 0 && digit === 1 && len > 1) text += 'เอ็ด';
            else text += numbers[digit];
            text += positions[pos];
          }
        }
        return text;
      }

      var text = '';
      if (baht.length > 6) {
        var million = baht.substring(0, baht.length - 6);
        var sub = baht.substring(baht.length - 6);
        text += convertSection(million) + 'ล้าน' + convertSection(sub);
      } else {
        text += convertSection(baht);
      }

      if (text === '') text = 'ศูนย์';
      text += 'บาท';

      if (!satang || parseInt(satang) === 0) {
        text += 'ถ้วน';
      } else {
        if (satang.length === 1) satang += '0';
        text += convertSection(satang) + 'สตางค์';
      }
      return text;
    }

    var EN_MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    var TH_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    function getPreviousMonthName(billingMonthStr) {
      if (!billingMonthStr || billingMonthStr.split('-').length !== 2) return '';
      var parts = billingMonthStr.split('-');
      var y = parseInt(parts[0]);
      var m = parseInt(parts[1]) - 1;
      var d = new Date(y, m - 1, 1);
      return TH_MONTHS[d.getMonth()];
    }

    function renderReceiptHtml(title, r, t, c, b, settings) {
      var prop = t.property_id || '';
      var compNameTh = '', compNameEn = '', compAddressTh = '', compAddressEn = '', compTaxId = '', compTel = '';
      var logoSrc = 'theserene.jpg';

      if (prop === 'moment') {
        logoSrc = 'themoment.jpg';
        compNameTh = settings.moment_company_name_th || 'บริษัท เดอะ โมเมนต์ หัวหิน จำกัด';
        compNameEn = settings.moment_company_name_en || 'THE MOMENT HUA HIN COMPANY LIMITED';
        compAddressTh = settings.moment_company_address_th || '21/234 ซอยหมู่บ้านทางรถไฟฝั่งตะวันตก ตำบลหัวหิน อำเภอหัวหิน จ.ประจวบคีรีขันธ์ 77110';
        compAddressEn = settings.moment_company_address_en || '21/234 Soi Moo Ban Thang Rot Fai Fang Ta Wan Tok, Tambon Hua Hin, Amphoe Hua Hin, Prachuapkirikhan 77110';
        compTaxId = settings.moment_company_tax_id || '0775561002281';
        compTel = settings.moment_company_tel || '094-567-4488, 094-249-1188';
      } else {
        logoSrc = 'theserene.jpg';
        compNameTh = settings.precious_company_name_th || settings.company_name_th || 'บริษัท เดอะ ซีรีน จำกัด ( สำนักงานใหญ่ )';
        compNameEn = settings.precious_company_name_en || settings.company_name_en || 'The Serene Company Limited (Head Office)';
        compAddressTh = settings.precious_company_address_th || settings.company_address_th || 'เลขที่ 21/234  ซอยหมู่บ้านทางรถไฟฝั่งตะวันตก ตำบลหัวหิน อำเภอหัวหิน จังหวัดประจวบคีรีขันธ์ 77110';
        compAddressEn = settings.precious_company_address_en || settings.company_address_en || '21/234 Soi Moo Ban Thang Rot Fai Fang Ta Wan Tok, Tambon Hua Hin, Amphoe Hua Hin, Prachuapkirikhan 77110';
        compTaxId = settings.precious_company_tax_id || settings.company_tax_id || '0-7755-55000-56-5';
        compTel = settings.precious_company_tel || settings.company_tel || '094-567-4488, 094-249-1188';
      }

      var formattedReceiptDate = formatBE(r.receipt_date);
      var roomDisp = t.room_name || '-';

      // Buyer block: if this receipt was billed to a company, use the frozen
      // company snapshot; otherwise fall back to the individual customer.
      var isCompany = !!(r && r.company_name);
      var buyerName = isCompany
        ? (r.company_name + (r.company_branch ? ' (' + r.company_branch + ')' : ''))
        : (t.guest_or_vendor || '');
      var buyerAddress = isCompany ? (r.company_address || '') : (c ? c.address : '');
      var buyerTaxNo = isCompany
        ? (r.company_tax_id || '-')
        : (c && c.id_card ? c.id_card : '-');

      var rowsHtml = '';
      var itemIndex = 1;

      t.items.forEach(function(item) {
        var description = escapeHtml(item.description);
        var subRowsHtml = '';
        var unitLabel = 'รายการ';

        var catLower = (item.category || '').toLowerCase();
        if (catLower === 'rent' || catLower === 'monthly rent' || catLower === 'daily rent' || catLower === 'bk rent' || catLower === 'exp rent') {
          description = 'ค่าเช่าห้อง/room rent';
          var isMonthly = t.category === 'monthly rent' || t.category === 'rent' || (b && b.booking_type === 'monthly') || catLower === 'monthly rent';
          unitLabel = isMonthly ? 'เดือน' : 'วัน';

          if (b) {
            if (r.receipt_type === 'RD') {
              subRowsHtml += '<div style="font-size:11px; margin-top:2px; color:#555;">Check-in date: ' + formatBE(b.checkin_date) + '</div>';
              subRowsHtml += '<div style="font-size:11px; color:#555;">Check-out date: ' + formatBE(b.checkout_date) + '</div>';
            } else {
              subRowsHtml += '<div style="font-size:11px; margin-top:2px; color:#555;">Move-in date: ' + formatBE(b.checkin_date) + '</div>';
              subRowsHtml += '<div style="font-size:11px; color:#555;">Move-out date: ' + formatBE(b.checkout_date) + ' (ก่อนเที่ยง)</div>';
            }
          }
        } else if (item.category === 'utility' || item.description.toLowerCase().indexOf('electric') !== -1) {
          var prevMonth = getPreviousMonthName(t.billing_month);
          description = 'ค่าไฟฟ้า/Electric Supply เดือน ' + prevMonth;
          unitLabel = 'หน่วย';
        } else if (item.category === 'utility' || item.description.toLowerCase().indexOf('water') !== -1) {
          var prevMonth = getPreviousMonthName(t.billing_month);
          description = 'ค่าน้ำ/Water Supply เดือน ' + prevMonth;
          unitLabel = 'หน่วย';
        } else if (item.description.toLowerCase().indexOf('card') !== -1) {
          description = 'เงินประกันบัตร / Card Deposit';
          unitLabel = 'ใบ';
        } else if (item.description.toLowerCase().indexOf('deposit') !== -1) {
          description = 'เงินประกัน / Room Deposit';
          unitLabel = 'รายการ';
        }

        rowsHtml +=
          '<tr>' +
            '<td class="border-bottom-dot">' + itemIndex + '</td>' +
            '<td class="border-bottom-dot">' +
              '<div>' + description + '</div>' +
              subRowsHtml +
            '</td>' +
            '<td class="border-bottom-dot right">' + (item.units || 1) + '</td>' +
            '<td class="border-bottom-dot center">' + unitLabel + '</td>' +
            '<td class="border-bottom-dot right">' + item.unit_price.toLocaleString(undefined, {minimumFractionDigits: 2}) + '</td>' +
            '<td class="border-bottom-dot right">' + item.amount.toLocaleString(undefined, {minimumFractionDigits: 2}) + '</td>' +
          '</tr>';

        itemIndex++;
      });

      for (var k = itemIndex; k <= 5; k++) {
        rowsHtml +=
          '<tr>' +
            '<td>&nbsp;</td>' +
            '<td>&nbsp;</td>' +
            '<td>&nbsp;</td>' +
            '<td>&nbsp;</td>' +
            '<td>&nbsp;</td>' +
            '<td>&nbsp;</td>' +
          '</tr>';
      }

      var totalVal = r.amount || t.net_amount || t.amount;
      var totalTextThai = bahtText(totalVal);

      var watermarkHtml = (r.status === 'cancelled') ? '<div class="watermark-cancelled">CANCELLED / ยกเลิก</div>' : '';
      return [
        '<div class="a4-paper">',
        watermarkHtml,
        '  <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">',
        '    <img src="' + logoSrc + '" style="height: 60px; width: auto; object-fit: contain;" />',
        '    <div class="company-header" style="margin-bottom: 0;">',
        '      <div class="company-name-th">' + escapeHtml(compNameTh) + '</div>',
        '      <div class="company-name-en">' + escapeHtml(compNameEn) + '</div>',
        '      <div class="company-address">' + escapeHtml(compAddressTh) + '</div>',
        '      <div class="company-address">' + escapeHtml(compAddressEn) + '</div>',
        '      <div class="company-address" style="margin-top:4px; font-weight:bold;">',
        '        เลขประจำตัวผู้เสียภาษี/ Tax No. ' + escapeHtml(compTaxId) + ' &nbsp;&nbsp;&nbsp;&nbsp; โทร./ Tel. ' + escapeHtml(compTel),
        '      </div>',
        '    </div>',
        '  </div>',
        '',
        '  <div class="receipt-title-bar">' + title + '</div>',
        '',
        '  <div class="meta-grid">',
        '    <div class="meta-left">',
        '      <div class="meta-row">',
        '        <div class="meta-label">ได้รับเงินจาก Name :</div>',
        '        <div class="meta-value" style="font-weight:bold;">' + escapeHtml(buyerName) + '</div>',
        '      </div>',
        '      <div class="meta-row">',
        '        <div class="meta-label">ที่อยู่ Address :</div>',
        '        <div class="meta-value">' + escapeHtml(buyerAddress || '') + '</div>',
        '      </div>',
        '      <div class="meta-row">',
        '        <div class="meta-label">เลขประจำตัวผู้เสียภาษี Tax No:</div>',
        '        <div class="meta-value" style="font-family:monospace; letter-spacing:1.5px;">' + escapeHtml(buyerTaxNo) + '</div>',
        '      </div>',
        '    </div>',
        '    <div class="meta-right">',
        '      <div class="meta-row">',
        '        <div class="meta-label" style="width:100px;">เลขที่/No.</div>',
        '        <div class="meta-value" style="font-weight:bold; font-family:monospace;">' + escapeHtml(r.receipt_no) + '</div>',
        '      </div>',
        '      <div class="meta-row">',
        '        <div class="meta-label" style="width:100px;">วันที่/Date</div>',
        '        <div class="meta-value">' + formattedReceiptDate + '</div>',
        '      </div>',
        '    </div>',
        '  </div>',
        '',
        '  <div style="font-size:13px; margin-bottom:8px;">ตามรายการดังต่อไปนี้ As followed:</div>',
        '',
        '  <div class="table-container">',
        '    <table>',
        '      <thead>',
        '        <tr>',
        '          <th style="width:6%;">No.</th>',
        '          <th style="width:50%;">รายการ<br>Description</th>',
        '          <th style="width:10%; text-align:right;">ปริมาณ<br>Quantity</th>',
        '          <th style="width:8%; text-align:center;">หน่วย<br>Unit</th>',
        '          <th style="width:12%; text-align:right;">ราคา<br>Price</th>',
        '          <th style="width:14%; text-align:right;">จำนวนเงิน<br>Amount</th>',
        '        </tr>',
        '      </thead>',
        '      <tbody>' + rowsHtml + '</tbody>',
        '    </table>',
        '  </div>',
        '',
        '  <div class="remark-section">',
        '    <strong>หมายเหตุ / Remark:</strong> <span contenteditable="true" class="editable-remark" style="display:inline-block; min-width:400px; border-bottom:1px dashed #999; outline:none; padding: 0 4px;"></span>',
        '  </div>',
        '',
        '  <div class="summary-section">',
        '    <div class="baht-text-box">(' + totalTextThai + ')</div>',
        '    <div class="total-box">',
        '      <div>รวม / Total:</div>',
        '      <div class="double-underline">' + totalVal.toLocaleString(undefined, {minimumFractionDigits: 2}) + '</div>',
        '    </div>',
        '  </div>',
        '',
        '  <div class="signature-grid">',
        '    <div class="sig-col">',
        '      <div class="sig-line"></div>',
        '      <div>ผู้รับเงิน / Collector</div>',
        '    </div>',
        '    <div class="sig-col">',
        '      <div class="sig-line"></div>',
        '      <div>ผู้จัดการ / Manager</div>',
        '    </div>',
        '  </div>',
        '</div>'
      ].join('\n');
    }

    window.onload = async function() {
      if (!HuaHinSession.requireSession()) return;
      var urlParams = new URLSearchParams(window.location.search);
      var receiptNoStr = urlParams.get('receipt_no');
      if (!receiptNoStr) { alert('No receipt number provided.'); return; }

      var receiptNos = receiptNoStr.split(',').filter(function(r) { return r.trim(); });
      var container = document.getElementById('receipt-container');
      container.innerHTML = '<div class="no-print" style="text-align:center; padding: 50px; font-weight:bold;">Loading receipts...</div>';

      var session = HuaHinSession.getSession();
      var token = session ? session.token : null;
      var fullHtml = '';
      var successCount = 0;

      for (var i = 0; i < receiptNos.length; i++) {
        var receiptNo = receiptNos[i];
        try {
          var res = await fetch(WORKER_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'financeGetReceipt', params: [token, receiptNo] })
          });
          var data = await res.json();
          if (!data.ok) {
            console.error('Failed to load receipt ' + receiptNo + ': ' + data.error);
            continue;
          }

          var r = data.receipt;
          var t = data.transaction;
          var c = data.customer;
          var b = data.booking;
          var settings = data.settings || {};

          var originalHtml = renderReceiptHtml('ใบเสร็จรับเงิน / Original Receipt', r, t, c, b, settings);
          var copyHtml = renderReceiptHtml('สำเนาใบเสร็จรับเงิน / Copy Receipt', r, t, c, b, settings);

          fullHtml += originalHtml + copyHtml;
          successCount++;
        } catch (err) {
          console.error('Connection error for receipt ' + receiptNo, err);
        }
      }

      if (successCount > 0) {
        container.innerHTML = fullHtml;
      } else {
        container.innerHTML = '<div class="no-print" style="text-align:center; color:red; padding: 50px;">Failed to load any receipts.</div>';
      }
    };
  </script>
</body>
</html>
